name: Test

# Runs the unit test suite (no network, no model weights required) on every
# push and pull request. All 40 tests use synthetic tensors / mocked HTTP
# responses -- none depend on downloading the real DrumSep checkpoint.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -q
